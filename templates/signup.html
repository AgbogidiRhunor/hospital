<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rhudesi Hospital — Sign Up</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;font-family:'Nunito',sans-serif;font-size:14px;background:linear-gradient(135deg,#E8F4F8 0%,#F0F6FF 50%,#EAF5F0 100%);padding:32px 16px;-webkit-font-smoothing:antialiased}
.box{background:#fff;border:1.5px solid #DDE2EC;border-radius:16px;max-width:520px;margin:0 auto;box-shadow:0 8px 40px rgba(0,0,0,.1);overflow:hidden}
.box-head{background:linear-gradient(135deg,#0B2240,#0B4A45);padding:28px 30px}
.bh-logo{font-size:1.1rem;font-weight:900;color:#fff;letter-spacing:-.2px}
.bh-logo span{color:#00D4C8}
.bh-sub{font-size:.72rem;color:rgba(255,255,255,.5);font-weight:600;margin-top:2px}
.box-body{padding:28px 30px}
h2{font-size:1.3rem;font-weight:900;color:#1A2332;margin-bottom:3px;letter-spacing:-.3px}
.sub{font-size:.8rem;color:#8A9AB5;margin-bottom:20px;font-weight:600}
/* roles */
.role-lbl{font-size:.68rem;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:#4A5568;display:block;margin-bottom:7px}
.roles{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:16px}
.role-card{border:1.5px solid #DDE2EC;border-radius:8px;padding:10px 6px;text-align:center;cursor:pointer;transition:.15s;display:flex;flex-direction:column;align-items:center;gap:3px}
.role-card:hover{border-color:#0EA5A0;background:#E6F7F7}
.role-card.active{border-color:#0EA5A0;background:#E6F7F7;box-shadow:0 0 0 2px rgba(14,165,160,.2)}
.role-card input{display:none}
.role-ico{font-size:1.2rem;line-height:1}
.role-nm{font-size:.67rem;font-weight:800;color:#4A5568}
.role-card.active .role-nm{color:#0EA5A0}
/* form */
.fg{margin-bottom:12px}.fg:last-of-type{margin-bottom:0}
.lbl{display:block;font-size:.68rem;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:#4A5568;margin-bottom:4px}
.inp{width:100%;background:#F7F9FC;border:1.5px solid #DDE2EC;border-radius:6px;padding:9px 12px;color:#1A2332;font-family:'Nunito',sans-serif;font-size:.87rem;font-weight:700;transition:.15s}
.inp:focus{outline:none;border-color:#0EA5A0;box-shadow:0 0 0 3px rgba(14,165,160,.1);background:#fff}
.inp::placeholder{color:#B0BBD0;font-weight:400}
select.inp option{background:#fff}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.doc-fields{display:none;background:#F7F9FC;border:1.5px solid #DDE2EC;border-radius:8px;padding:14px;margin-bottom:12px}
.btn{width:100%;padding:11px;background:linear-gradient(135deg,#0EA5A0,#0B8A85);color:#fff;border:none;border-radius:7px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.9rem;cursor:pointer;margin-top:14px;box-shadow:0 4px 14px rgba(14,165,160,.25);transition:.15s}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(14,165,160,.35)}
.err{background:#FEF2F2;border:1.5px solid #FECACA;border-radius:6px;padding:9px 13px;font-size:.79rem;color:#DC2626;margin-bottom:12px;font-weight:700}
.foot{text-align:center;margin-top:16px;font-size:.77rem;color:#8A9AB5;font-weight:600}
.foot a{color:#0EA5A0;font-weight:800}
</style>
</head>
<body>
<div class="box">
  <div class="box-head">
    <div class="bh-logo">Rhudesi<span>+</span> Hospital</div>
    <div class="bh-sub">Patient Management System</div>
  </div>
  <div class="box-body">
    <h2>Create your account</h2>
    <p class="sub">Select your role and fill in your details below</p>
    {% for msg in messages %}<div class="err">{{ msg }}</div>{% endfor %}
    <form method="post">{% csrf_token %}
      <label class="role-lbl">I am a</label>
      <div class="roles">
        <label class="role-card active" onclick="setRole('patient',this)"><input type="radio" name="role" value="patient" checked><div class="role-ico">🏥</div><div class="role-nm">Patient</div></label>
        <label class="role-card" onclick="setRole('doctor',this)"><input type="radio" name="role" value="doctor"><div class="role-ico">👨‍⚕️</div><div class="role-nm">Doctor</div></label>
        <label class="role-card" onclick="setRole('nurse',this)"><input type="radio" name="role" value="nurse"><div class="role-ico">👩‍⚕️</div><div class="role-nm">Nurse</div></label>
        <label class="role-card" onclick="setRole('receptionist',this)"><input type="radio" name="role" value="receptionist"><div class="role-ico">🖥</div><div class="role-nm">Reception</div></label>
        <label class="role-card" onclick="setRole('accountant',this)"><input type="radio" name="role" value="accountant"><div class="role-ico">💳</div><div class="role-nm">Accountant</div></label>
        <label class="role-card" onclick="setRole('pharmacist',this)"><input type="radio" name="role" value="pharmacist"><div class="role-ico">💊</div><div class="role-nm">Pharmacist</div></label>
        <label class="role-card" onclick="setRole('lab_attendant',this)"><input type="radio" name="role" value="lab_attendant"><div class="role-ico">🔬</div><div class="role-nm">Lab Tech</div></label>
      </div>
      <div class="g2">
        <div class="fg"><label class="lbl">First Name</label><input name="first_name" class="inp" placeholder="First name"></div>
        <div class="fg"><label class="lbl">Last Name</label><input name="last_name" class="inp" placeholder="Last name"></div>
      </div>
      <div class="fg"><label class="lbl">Username</label><input name="username" class="inp" placeholder="Choose a username" required></div>
      <div class="g2">
        <div class="fg"><label class="lbl">Password</label><input type="password" name="password" class="inp" placeholder="Password" required></div>
        <div class="fg"><label class="lbl">Confirm</label><input type="password" name="password2" class="inp" placeholder="Repeat" required></div>
      </div>
      <div class="doc-fields" id="docFields">
        <div class="g2">
          <div class="fg"><label class="lbl">Doctor Type</label>
            <select name="doctor_type" class="inp"><option value="general">General Practitioner</option><option value="specialist">Specialist</option></select>
          </div>
          <div class="fg"><label class="lbl">Specialization</label>
            <select name="specialization" class="inp">
              <option value="">— None —</option>
              {% for s in specializations %}<option value="{{ s.0 }}">{{ s.1 }}</option>{% endfor %}
            </select>
          </div>
        </div>
      </div>
      <button type="submit" class="btn">Create Account →</button>
    </form>
    <div class="foot">Already have an account? <a href="{% url 'login' %}">Sign in</a></div>
  </div>
</div>
<script>
function setRole(val,card){
  document.querySelectorAll('.role-card').forEach(c=>c.classList.remove('active'));
  card.classList.add('active');
  card.querySelector('input').checked=true;
  document.getElementById('docFields').style.display=val==='doctor'?'block':'none';
}
</script>
</body>
</html>
